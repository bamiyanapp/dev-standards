name: Reusable CD

on:
  workflow_call:
    inputs:
      enable_release:
        description: "semantic-releaseによるバージョン更新・タグ付け・GitHub Release作成を行うかどうか。release運用をしないリポジトリはfalseを指定する。"
        type: boolean
        default: true
      semantic_release_node_version:
        description: "semantic-releaseの実行に使うNode.jsのバージョン。semantic-release本体やプラグインが他のジョブより新しいNode.jsを要求することがあるため別に指定する。"
        type: string
        default: "lts/*"
      enable_shared_release_config:
        description: "semantic-releaseの共通設定（release-config.cjs のbuildReleaseConfig()）を参照側リポジトリへコピーするかどうか。有効にする場合、参照側の.releaserc.cjsで`require('./release-config.cjs').buildReleaseConfig({...})`を呼び出す構成にする必要がある。"
        type: boolean
        default: false
      enable_changelog_json:
        description: "CHANGELOG.mdをJSON化するスクリプトを実行前に生成し、semantic-releaseのprepareCmd（scripts/convert-changelog-to-json.js）から利用可能にするかどうか。"
        type: boolean
        default: false
      changelog_source_path:
        description: "変換元のCHANGELOG.mdパス（リポジトリルート基準）。enable_changelog_json=trueの場合のみ使用。"
        type: string
        default: "CHANGELOG.md"
      changelog_json_output_path:
        description: "変換後のJSON出力先パス（リポジトリルート基準）。enable_changelog_json=trueの場合のみ使用。"
        type: string
        default: "frontend/src/changelog.json"
    secrets:
      BOT_TOKEN:
        required: false
    outputs:
      new_release_published:
        description: "このpush（base_branchへのマージ）がsemantic-releaseによる新バージョンのリリースだったかどうか"
        value: ${{ jobs.release.outputs.new_release_published }}
      version:
        description: "リリースされたバージョン番号（リリースでない場合は空文字列）"
        value: ${{ jobs.release.outputs.version }}

jobs:
  # base_branch（push）上で直接semantic-releaseを実行する。
  #
  # 以前はreusable-ci.ymlのmergeジョブがPRの作業ブランチ上でsemantic-releaseを
  # 実行していたが、pull_requestイベントでGitHub Actionsが自動設定するGITHUB_REF/
  # GITHUB_REF_NAMEはrefs/pull/<PR番号>/mergeに固定されており、ワークフローYAMLの
  # env:では上書きできない（GitHub Actionsの予約変数のため）。そのためsemantic-release
  # のブランチ判定は常にrefs/pull/<PR番号>/mergeを見てしまい、「対象ブランチと
  # 一致しないため公開しない」と判定されて新バージョンが一切発行されない状態が
  # 続いていた（各ジョブ自体は成功扱いになるため発覚しにくい）。
  #
  # base_branchへの実際のpushイベント上で実行すれば、GITHUB_REFは素直に
  # refs/heads/<base_branch>になり、上記の問題が起きない。
  release:
    name: Release
    if: inputs.enable_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # 複数のpushが短時間に連続した場合でもバージョン計算・タグ付けが競合しないよう、
    # リポジトリ全体で1件ずつ直列に処理する。
    concurrency:
      group: release-${{ github.repository }}
      cancel-in-progress: false
    outputs:
      new_release_published: ${{ steps.check-release.outputs.release_prepared }}
      version: ${{ steps.check-release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # @semantic-release/gitのpush・@semantic-release/githubのタグ/リリース作成に
          # 書き込み権限が必要なため、BOT_TOKEN（未設定時はGITHUB_TOKEN）を使う
          token: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || github.token }}

      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Setup Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.semantic_release_node_version }}
          cache: "npm"

      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10

      - name: Setup Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.semantic_release_node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # semantic-releaseの`extends`はplugins配列を連結してしまい同名プラグインが
      # 重複実行されるため使用せず、release-config.cjsを参照側にコピーして
      # .releaserc.cjsから素のrequire()で読み込む構成にしている（詳細は
      # release-config.cjs冒頭のコメントを参照）。
      - name: Copy shareable semantic-release config
        if: inputs.enable_shared_release_config
        uses: bamiyanapp/dev-standards/.github/actions/copy-release-config@v1.0.1

      # 参照側リポジトリがsubmodule経由のシンボリックリンクとしてこのスクリプトを
      # 持つ場合でも、このジョブのcheckoutはsubmoduleを取得しないためリンク先が
      # 存在せずsemantic-releaseのprepareCmdが失敗する。そのため、dev-standards
      # 本体が持つ実体ファイル（scripts/convert-changelog-to-json.js）を
      # このジョブ内で参照側リポジトリへコピーし、参照側に実体を持たせない。
      - name: Copy changelog-to-JSON conversion script
        if: inputs.enable_changelog_json
        uses: bamiyanapp/dev-standards/.github/actions/copy-changelog-script@v1.0.1

      - name: Record pre-release commit
        id: pre-release
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # base_branchへの実push上で実行するため、--no-ciやブランチ判定の上書きは不要。
      # semantic-releaseは通常通りGITHUB_ACTIONS環境を自動検知してCIモードで動作する。
      #
      # base_branchが「変更は必ずPR経由」のリポジトリルールで保護されている場合、
      # @semantic-release/gitのprepareステップ内のgit push（base_branchへの直接push）は
      # GH013エラーで拒否される。ただしこの時点で@semantic-release/changelog・npm・execの
      # prepareは既に完了しており、CHANGELOG.md/package.json/変換後JSONの更新と
      # ローカルコミットは完了している（gitプラグインはコミット→pushの順で処理し、
      # 失敗するのはpushのみ）。なお、semantic-releaseコア本体によるgitタグの作成は
      # このpush処理よりも後の工程で行われるため、ここではまだ作成されていない
      # （タグ名の取得方法は後続の check-release ステップのコメントを参照）。
      # そのため、continue-on-errorでこのpush失敗を
      # 致命的エラーとして扱わず、後続のステップでsteps.semantic-release.outcomeを見て
      # 「実際に失敗したか」を判定したうえで、ローカルに作成済みのコミットを新しいブランチへ
      # push・PR作成・APIでのマージという「PR経由」の手段でbase_branchへ反映する
      # （base_branchが保護されていないリポジトリでは直接pushがそのまま成功するため、
      # 後述のフォールバック処理は実行されず不要なPRは作られない）。
      - name: Semantic Release (prepare; direct push to a protected base_branch is expected to fail here)
        id: semantic-release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          CHANGELOG_SOURCE_PATH: ${{ inputs.changelog_source_path }}
          CHANGELOG_JSON_OUTPUT_PATH: ${{ inputs.changelog_json_output_path }}
        run: npx semantic-release

      # semantic-releaseは新バージョンを発行する場合のみローカルにコミット・タグを
      # 作成するため、実行前後のコミットを比較してリリース有無を判定する。
      # base_branchが保護されておらず直接pushが成功していた場合はこの時点で
      # @semantic-release/githubのpublishまで完了済みのため、release_needs_pr=falseとし
      # 後続のPRフォールバック処理をスキップする。
      #
      # タグ名の取得に`git tag --points-at HEAD`を使わないのは、base_branchが
      # 保護されている場合、@semantic-release/gitのprepareステップは「コミット→
      # push」の順で処理し、pushがGH013で失敗した時点でsemantic-release全体が
      # 例外終了するため。この場合、実際にはコミットのみがローカルに作成された
      # 状態であり、git tagによるタグ付け（semantic-releaseコア側のpublish直前の
      # 処理）自体が一度も実行されないため、git tagで探しても何も見つからない。
      # 一方@semantic-release/npmのprepareはこのpush処理より前に完了しており、
      # package.jsonには新バージョンが既に書き込まれているため、これを信頼できる
      # 取得元として使う（base_branchが保護されておらず直接pushが成功した場合も
      # package.jsonの内容は同一のため、この方法はどちらのケースでも正しく動作する）。
      - name: Check if a release was prepared locally
        id: check-release
        run: |
          AFTER_SHA=$(git rev-parse HEAD)
          if [ "${{ steps.pre-release.outputs.sha }}" != "$AFTER_SHA" ]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "release_prepared=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "release_prepared=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ steps.semantic-release.outcome }}" = "failure" ]; then
            echo "release_needs_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_needs_pr=false" >> "$GITHUB_OUTPUT"
          fi

      # ローカルに作成済みのバージョン更新コミットを新しいブランチへpushする
      # （base_branchではない新規ブランチ名のため、ブランチ保護の対象外）。
      - name: Push the prepared release commit to a new branch
        if: steps.check-release.outputs.release_needs_pr == 'true'
        id: push-release-branch
        env:
          TAG: ${{ steps.check-release.outputs.tag }}
        run: |
          BRANCH="chore/release-${TAG}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # 新しいブランチからbase_branchへのPRを作成し、API経由でsquash mergeする。
      # 「PR経由の変更」としてリポジトリルールを満たしたうえでbase_branchへ反映する。
      - name: Create and merge the release pull request
        if: steps.check-release.outputs.release_needs_pr == 'true'
        id: merge-release-pr
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const branch = "${{ steps.push-release-branch.outputs.branch }}";
            const tag = "${{ steps.check-release.outputs.tag }}";
            const baseBranch = context.ref.replace("refs/heads/", "");

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: baseBranch,
              title: `chore(release): ${tag} [skip ci]`,
              body: "semantic-releaseによる自動バージョン更新PRです。",
            });
            console.log(`Created release PR #${pr.number}`);

            let mergeSha = "";
            // pushで作成したブランチ直後はGitHub側のmergeable判定が
            // 追いついていないことがあるため、短い間隔でリトライする
            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const { data } = await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: "squash",
                });
                mergeSha = data.sha;
                core.setOutput("merge_sha", mergeSha);
                console.log(`Successfully merged release PR #${pr.number} as ${mergeSha}`);
                break;
              } catch (error) {
                if (attempt === maxAttempts) {
                  console.error(`Failed to merge release PR #${pr.number}:`, error.message);
                  throw error;
                }
                console.log(`Merge attempt ${attempt} failed (${error.message}), retrying...`);
                await new Promise((resolve) => setTimeout(resolve, attempt * 3000));
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
            } catch (error) {
              if (!(error.status === 422 || error.message.includes("Reference does not exist"))) {
                console.error(`Failed to delete branch ${branch}:`, error.message);
              }
            }

      # squash mergeによりリリースコミットはbase_branch上で新しいコミットに
      # 置き換わる（タグが指すコミットはbase_branchの祖先ではなくなる）ため、
      # タグをsquash後のコミットへ付け替える（tagはrefs/tags/以下でありrefs/heads/への
      # 変更を対象とするリポジトリルールの影響を受けない）。
      - name: Retarget release tag to the squashed commit
        if: steps.check-release.outputs.release_needs_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check-release.outputs.tag }}
          MERGE_SHA: ${{ steps.merge-release-pr.outputs.merge_sha }}
        run: |
          # squash mergeで作られたコミットはこの時点でローカルに存在しないため、
          # base_branchを取得してオブジェクトを取り込んでからタグを打ち直す
          git fetch origin "${{ github.ref_name }}"
          git tag -f "$TAG" "$MERGE_SHA"
          git push origin "refs/tags/$TAG" --force

      # @semantic-release/githubのpublishステップはpush失敗により実行されないため、
      # GitHub Releaseを別途作成する。リリースノートはsemantic-releaseが既に更新した
      # CHANGELOG.mdの該当バージョン節から抽出する。
      #
      # createではなくedit優先のupsertにしているのは、同名タグのReleaseが既に
      # 存在するケースが実際に発生したため（過去に何らかの経緯でgit tagの実体が
      # 失われた状態のままGitHub Release自体は残っていたリポジトリがあり、
      # semantic-releaseはgit tag側しか見ないため同じバージョン番号を再計算して
      # 衝突した）。`gh release create`はタグ名が既存のReleaseと重複すると
      # HTTP 422で失敗するため、まずeditを試し、対象が存在しない通常ケースでは
      # editが失敗するのでcreateにフォールバックする。
      - name: Create GitHub Release
        if: steps.check-release.outputs.release_needs_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check-release.outputs.tag }}
          VERSION: ${{ steps.check-release.outputs.version }}
        run: |
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^# \\[?" ver { flag=1; next }
            flag && /^# \[?[0-9]/ { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          gh release edit "$TAG" --title "$TAG" --notes "$NOTES" \
            || gh release create "$TAG" --title "$TAG" --notes "$NOTES"
