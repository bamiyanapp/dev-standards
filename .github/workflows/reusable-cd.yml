name: Reusable CD

on:
  workflow_call:
    outputs:
      new_release_published:
        description: "このpush（base_branchへのsquash merge）がsemantic-releaseによる新バージョンのリリースだったかどうか"
        value: ${{ jobs.release.outputs.new_release_published }}
      version:
        description: "リリースされたバージョン番号（リリースでない場合は空文字列）"
        value: ${{ jobs.release.outputs.version }}

jobs:
  # バージョンの計算・タグ付け・CHANGELOG更新は reusable-ci.yml の merge job で
  # base_branchへのマージ前（PRの作業ブランチ上）に完了している。このジョブは
  # base_branchへのpushが新規リリースかどうかをHEADのタグの有無から判定するのみ。
  release:
    name: Detect Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.detect.outputs.new_release_published }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect release tag at HEAD
        id: detect
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -n "$TAG" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi
