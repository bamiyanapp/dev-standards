name: Reusable CI

on:
  workflow_call:
    inputs:
      frontend_dir:
        description: "frontendパッケージのディレクトリ名"
        type: string
        default: "frontend"
      backend_dir:
        description: "backendパッケージのディレクトリ名"
        type: string
        default: "backend"
      node_version:
        description: "frontend/backendのビルド・テストに使うNode.jsのバージョン"
        type: string
        default: "20"
      workspaces:
        description: "frontend/backendがnpm workspaces構成（ルート直下に単一のpackage-lock.jsonのみを持つ）かどうか。trueの場合、依存インストールをリポジトリルートで行う。"
        type: boolean
        default: false
      enable_e2e_test:
        description: "frontendのE2Eテスト（Playwright）ジョブを実行するかどうか。実行する場合、frontend_dir配下にtest:e2eスクリプトが必要。"
        type: boolean
        default: false
      enable_auto_merge:
        description: "CI（frontend-test/backend-test/frontend-e2e-test）成功後にmergeジョブでPRを自動マージするかどうか。falseの場合、CIチェックのみ行い、マージは人手で行う。"
        type: boolean
        default: true
      # 以下のrelease関連inputは後方互換のために残しているが、このワークフロー内では
      # 使用しない（semantic-releaseの実行はreusable-cd.ymlのreleaseジョブへ移動した。
      # 理由: pull_requestイベントのGITHUB_REF/GITHUB_REF_NAMEはrefs/pull/<PR番号>/mergeに
      # 固定されGitHub Actions上で上書きできないため、PRブランチ上でsemantic-releaseの
      # ブランチ判定を偽装する方式は機能しない。同じ入力名をreusable-cd.yml側で受け取る）。
      enable_release:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。reusable-cd.ymlの同名inputを指定すること。"
        type: boolean
        default: true
      semantic_release_node_version:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "22"
      base_branch:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "main"
      enable_changelog_json:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: boolean
        default: false
      changelog_source_path:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "CHANGELOG.md"
      changelog_json_output_path:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "frontend/src/changelog.json"
      enable_standards_check:
        description: "dev-standards submoduleのsync-manifest.jsonに基づき、symlink欠落・リンク切れ・.gitignoreの内容乖離を`scripts/bootstrap.js --check`で検知するジョブを実行するかどうか。"
        type: boolean
        default: false
      enable_shared_release_config:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: boolean
        default: false
      packages:
        description: >-
          frontend_dir/backend_dirによる固定2パッケージ構成の代わりに、matrix構成でlint/test/buildする
          パッケージ一覧をJSON配列で指定する（例: '[{"dir":"frontend","build":true},{"dir":"backend"}]'）。
          各要素は{dir, build, node_version, coverage_threshold, coverage_metrics, coverage_check_per_file}を
          持つオブジェクトで、dir以外は省略可能（buildは省略時false、node_versionは省略時inputs.node_version、
          coverage_threshold/coverage_metrics/coverage_check_per_fileは省略時それぞれ対応するinputs.*）。
          lint（`npm run lint --if-present`）・test（`npm test --if-present`）は対応するnpm scriptsが
          package.jsonに存在しない場合は自動的にスキップする（テストランナー非依存。vitest直接呼び出しは行わない）。
          空文字列（既定）の場合は既存通りfrontend_dir/backend_dirの固定ジョブを使う（後方互換のためデフォルトは空）。
        type: string
        default: ""
      coverage_threshold:
        description: >-
          カバレッジ閾値（%、0以下でゲート無効）。frontend-test/backend-testでは`npx vitest run --coverage`に
          `--coverage.reporter=json-summary`を追加して集計を出力し、閾値未満ならジョブを失敗させる。
          いずれの場合もcoverage/coverage-summary.jsonが存在すればJob Summaryにカバレッジ表を出力する
          （閾値を設定していない場合も表示のみは行われる）。packagesのmatrix構成では各要素の
          coverage_thresholdで上書きできる（テストコマンド自体がjson-summaryを出力する設定になっている必要がある）。
        type: number
        default: 0
      coverage_metrics:
        description: >-
          coverage_thresholdによるゲート判定の対象指標をカンマ区切りで指定する（例: "branches"）。
          省略時（空文字列）はlines/statements/functions/branchesの全4種を判定対象にする。表自体は
          常に全指標を表示し、判定のみ絞り込む。packagesのmatrix構成では各要素のcoverage_metricsで
          上書きできる。
        type: string
        default: ""
      coverage_check_per_file:
        description: >-
          trueの場合、total（パッケージ全体平均）に加えてファイル単位でもcoverage_threshold/
          coverage_metricsと同じ基準で判定する。一部のファイルのカバレッジが著しく低くても
          全体平均でクリアしてしまう問題に対応する。packagesのmatrix構成では各要素の
          coverage_check_per_fileで上書きできる。
        type: boolean
        default: false
    secrets:
      BOT_TOKEN:
        required: false

jobs:
  # commitlintジョブは実際のコミットメッセージ検証の前に、Node.jsセットアップ・
  # 依存関係インストールという「インフラ起因で失敗しうる」工程を挟む。これらが
  # GitHub側の一時的な障害（setup-nodeのバージョンマニフェスト取得失敗等）で
  # 失敗した場合と、コミットメッセージ自体が実際に規約違反だった場合を区別できるよう、
  # 各工程をcontinue-on-error付きで実行し、最後の「Determine result」ステップで
  # 出力（infra_failure）へ反映する。後続の各テストジョブは、commitlintジョブが
  # 失敗していてもinfra_failure=trueであれば実行される（インフラ起因の失敗で
  # テスト結果自体が見えなくなることを防ぐ）。ただし`merge`ジョブは、コミット
  # メッセージを実際に検証できていない以上、いずれの失敗理由でも従来通りブロックされる
  # （needs.commitlint.result == 'success'を要求したまま変更しない）。
  #
  # infra_failure=trueとするのはNode.jsセットアップが2回とも失敗した場合のみに限定する。
  # npm ci（Install dependencies）自体の失敗はNode.jsセットアップの成否とは独立した問題
  # であり、GitHub側の一時的な障害ではなくルート直下のpackage.json/package-lock.json
  # 自体の不整合である可能性が高い。かつてはnpm ciの失敗も一律infra_failure=trueとして
  # いたため、後続のfrontend-test等はブロックされないもののcommitlintジョブ自体は
  # 失敗扱いとなりmergeジョブ（needs.commitlint.result == 'success'を要求）は正しく
  # ブロックされていたが、CI完了を待たずに手動マージされた場合はこの検知を素通りして
  # しまい、実際にCD（release job）側でのみ`npm ci`が失敗するという事例が発生した
  # （bamiyanapp/karuta#639由来のロックファイル不整合、CD run #340以降の連続失敗）。
  # infra_failureか否かの分類自体を誤りにくくすることが目的で、根本的な対策
  # （CI完了前のマージを防ぐ）は各リポジトリのブランチ保護設定側の責務とする。
  commitlint:
    runs-on: ubuntu-latest
    outputs:
      infra_failure: ${{ steps.result.outputs.infra_failure }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true
      # setup-nodeはNode.jsバージョンマニフェストの取得をGitHub側から行うため、
      # 一時的な障害（HTMLのエラーページが返りJSONパースに失敗する等）で失敗することがある。
      # 特に"lts/*"のようなエイリアスはこの障害の影響を受けやすい専用の解決経路
      # （"Attempt to resolve LTS alias from manifest..."）を通るため、具体的な
      # メジャーバージョン番号（"22"）へ固定してこの経路自体を回避する。それでも
      # 発生しうる一時的な失敗に備え、同一の呼び出しを1回だけ自動リトライする
      # （新しいアクション参照を追加すると、このリポジトリ自身が未タグ付けの状態で
      # それを参照することになり解決できないため、複合アクション化はせずジョブ内に
      # インラインで実装する）
      - name: Setup Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Setup Node.js (attempt 2/2, retry after a transient failure)
        id: setup-node-2
        if: steps.setup-node-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        id: install
        if: steps.setup-node-1.outcome == 'success' || steps.setup-node-2.outcome == 'success'
        continue-on-error: true
        run: npm ci
      - name: Validate current commit (last commit)
        id: lint-push
        if: steps.install.outcome == 'success' && github.event_name == 'push'
        continue-on-error: true
        run: npx commitlint --from HEAD~1 --to HEAD --verbose
      - name: Validate PR commits
        id: lint-pr
        if: steps.install.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --git-log-args="--no-merges" \
            --verbose
      # mergeジョブはPRをsquash mergeし、コミットタイトルを指定しないため、GitHubは
      # デフォルトでPRタイトルをそのままmainに残る唯一のコミットの件名にする。
      # 上の「Validate PR commits」はPR内の個々のコミットメッセージしか検証しないため、
      # 実際にsemantic-releaseの入力になるPRタイトル自体がConventional Commits形式
      # （単一の有効なtype）に反していても素通りしていた。これによりPRタイトルで
      # 複数のtypeを`/`で連結する（例:`fix/feat: ...`）と、squash merge後の
      # commit-analyzerがtypeを認識できずリリースが生成されない問題が発生した
      # （bamiyanapp/karuta#722）。PRタイトル自体も同じcommitlintルールで検証する。
      # PRタイトルは第三者が自由に入力できる値のため、シェルへの直接展開（`${{ }}`を
      # runスクリプト内に埋め込む書き方）を避け、env経由で渡すことでコマンド
      # インジェクションを防ぐ
      - name: Validate PR title (squash merge commit subject)
        id: lint-pr-title
        if: steps.install.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint --verbose
      - name: Determine result
        id: result
        shell: bash
        run: |
          if [ "${{ steps.setup-node-1.outcome }}" != "success" ] && [ "${{ steps.setup-node-2.outcome }}" != "success" ]; then
            # Node.jsセットアップ自体が2回とも失敗した場合のみ、GitHub側の一時的な
            # 問題とみなしinfra_failureとして扱う（後続のテストジョブをブロックしない）
            echo "infra_failure=true" >> "$GITHUB_OUTPUT"
            echo "::warning::commitlintジョブのNode.jsセットアップに2回とも失敗したため、コミットメッセージの検証自体を実行できませんでした。GitHub側の一時的な問題（setup-nodeのバージョンマニフェスト取得失敗等）とみなし、後続のテストジョブはこの失敗を理由にブロックしませんが、mergeジョブはコミットメッセージを実際に検証できていないため引き続きブロックされます。"
            exit 1
          fi
          if [ "${{ steps.install.outcome }}" != "success" ]; then
            # Node.jsセットアップは成功しているため、npm ci自体の失敗はルート直下の
            # package.json/package-lock.jsonの不整合等、実際に対応が必要な問題である
            # 可能性が高い。一時的なインフラ障害と誤って扱いテストジョブの実行を許して
            # しまうと、CDでのみ`npm ci`が実行される問題（release job等）がCIをすり抜けて
            # マージされてしまうため、infra_failureとはせず通常の失敗として扱う
            echo "infra_failure=false" >> "$GITHUB_OUTPUT"
            echo "::error::commitlintジョブの`npm ci`が失敗しました。Node.jsセットアップは成功しているため、GitHub側の一時的な問題ではなく、ルート直下のpackage.json/package-lock.jsonの不整合等、実際に対応が必要な問題の可能性が高いです。`npm install`でロックファイルを更新してから再コミットしてください。"
            exit 1
          fi
          echo "infra_failure=false" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.lint-push.outcome }}" = "failure" ] || [ "${{ steps.lint-pr.outcome }}" = "failure" ] || [ "${{ steps.lint-pr-title.outcome }}" = "failure" ]; then
            exit 1
          fi
          exit 0

  frontend-test:
    needs: commitlint
    if: |
      always() &&
      inputs.packages == '' &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.frontend_dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run lint
      # vitest自体もテスト単位の自動リトライ（呼び出し元のvitest.config等でretryを
      # 設定していれば効く）を行えるが、CI実行環境全体の負荷（並列ジョブによる
      # CPU競合等）に起因する実タイマー依存テストの偶発的な失敗は、テスト単位の
      # リトライだけでは救えないことがある。そのため、setup-nodeと同様にジョブの
      # Testステップ自体も1回だけ自動リトライする
      #
      # `--no-file-parallelism`（テストファイルを並列実行せず直列実行する）を
      # 付けているのは、`@vitest/coverage-v8`が複数ワーカー（デフォルトのfileごとの
      # 並列実行）にまたがって同一ソースファイルを計測する際、カバレッジの集計に
      # 不整合が生じる現象を実際に確認したため（bamiyanapp/karuta#459で
      # coverage_threshold: 80を有効化した際、ローカルの直列実行では分岐カバレッジ
      # 84%だったファイルが、CI上の既定の並列実行では50%と計測され、実際には
      # 満たしている閾値を誤って未達と判定してしまっていた）。複数のテストファイルが
      # 同じソースファイルを import する構成（例: 複数のLambdaハンドラファイルが
      # 共通のヘルパー関数を1つのファイルから読み込む等）で起きやすい。実行時間は
      # 延びるが、カバレッジ判定の正確性を優先する
      - name: Test (attempt 1/2)
        id: test-1
        continue-on-error: true
        working-directory: ${{ inputs.frontend_dir }}
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --no-file-parallelism
      - name: Wait before retrying the test run
        if: steps.test-1.outcome == 'failure'
        shell: bash
        run: sleep 5
      - name: Test (attempt 2/2, retry after a possible flaky failure)
        if: steps.test-1.outcome == 'failure'
        working-directory: ${{ inputs.frontend_dir }}
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --no-file-parallelism
      # ステップの`uses: ./path`は常に呼び出し元リポジトリ（このジョブでCheckoutした
      # 対象、frontend_dir/backend_dirを持つ側）のチェックアウト内容に対して解決される
      # （reusable-ci.yml自身のrefには解決されない。ジョブレベルの`uses:`でreusable
      # workflow自体を参照する場合と異なる点に注意）。また、`uses:`フィールド自体は
      # steps contextを参照できず、ジョブ計画時に静的に解決可能な値でなければならない
      # （`steps.<id>.outputs`のような実行時の値を`uses:`に直接渡すと、そのジョブが
      # 1つも作成されないまま即座に失敗する＝startup failureになる。過去の修正で
      # 一度この誤った実装をリリースしてしまい、他リポジトリ（karuta）のCIを完全に
      # 止めた実例がある）。
      #
      # このワークフロー自身のrefを動的に取得する試み（`GITHUB_WORKFLOW_REF`環境変数
      # から抽出する方式）も試したが、これは呼び出し元（karuta等）のトップレベル
      # ワークフロー自身のref（PRのマージref等）を返すのであってdev-standards側の
      # refではなく、実際にcheckoutしようとして失敗した（詳細はbamiyanapp/karuta#583）。
      # ライブ環境でしか検証できない性質の問題を2度誤って踏んだため、これ以上の動的
      # 解決は試みず、固定タグを明示的に指定する方式にする。dev-standardsの新しい
      # リリースのたびに、この参照タグを手動で最新へ更新すること。
      #
      # 「check-coverage-threshold自体の内容が変わらない限り実害はない」という
      # 想定は誤りだった。v1.2.2のまま長期間更新を忘れていたため、後にaction.ymlへ
      # 追加された`metrics`/`check-per-file`入力（[dev-standards#57](https://github.com/bamiyanapp/dev-standards/issues/57)）を
      # 参照側（karuta等）が指定しても、古いv1.2.2版のaction.ymlにその入力定義が
      # 無いため`Unexpected input(s)`という警告だけが出て黙って無視され、
      # coverage_metrics/coverage_check_per_fileによる絞り込みが一切効かないまま
      # 全指標・total平均のみでの判定にフォールバックしてしまう不具合が発生した
      # （bamiyanapp/karuta#459でcoverage_threshold: 80を有効化した際に発覚）。
      # action.ymlに入力を追加・変更した場合は、このrefの更新を絶対に忘れないこと。
      - name: Checkout dev-standards (for the local composite action)
        if: inputs.coverage_threshold > 0
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: v1.6.1
          path: .dev-standards-actions
      - name: Check coverage threshold
        if: inputs.coverage_threshold > 0
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ inputs.frontend_dir }}
          threshold: ${{ inputs.coverage_threshold }}
          label: frontend
          metrics: ${{ inputs.coverage_metrics }}
          check-per-file: ${{ inputs.coverage_check_per_file }}
      - name: Build
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run build

  backend-test:
    needs: commitlint
    if: |
      always() &&
      inputs.packages == '' &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.backend_dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.backend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.backend_dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ inputs.backend_dir }}
        run: npm run lint
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照
      - name: Test (attempt 1/2)
        id: test-1
        continue-on-error: true
        working-directory: ${{ inputs.backend_dir }}
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --no-file-parallelism
      - name: Wait before retrying the test run
        if: steps.test-1.outcome == 'failure'
        shell: bash
        run: sleep 5
      - name: Test (attempt 2/2, retry after a possible flaky failure)
        if: steps.test-1.outcome == 'failure'
        working-directory: ${{ inputs.backend_dir }}
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --no-file-parallelism
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照（bamiyanapp/karuta#583）
      - name: Checkout dev-standards (for the local composite action)
        if: inputs.coverage_threshold > 0
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: v1.6.1
          path: .dev-standards-actions
      - name: Check coverage threshold
        if: inputs.coverage_threshold > 0
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ inputs.backend_dir }}
          threshold: ${{ inputs.coverage_threshold }}
          label: backend
          metrics: ${{ inputs.coverage_metrics }}
          check-per-file: ${{ inputs.coverage_check_per_file }}

  package-test:
    needs: commitlint
    if: |
      always() &&
      inputs.packages != '' &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(inputs.packages) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.package.node_version || inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', matrix.package.dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.package.node_version || inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', matrix.package.dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || matrix.package.dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ matrix.package.dir }}
        run: npm run lint --if-present
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照
      - name: Test (attempt 1/2)
        id: test-1
        continue-on-error: true
        working-directory: ${{ matrix.package.dir }}
        run: npm test --if-present
      - name: Wait before retrying the test run
        if: steps.test-1.outcome == 'failure'
        shell: bash
        run: sleep 5
      - name: Test (attempt 2/2, retry after a possible flaky failure)
        if: steps.test-1.outcome == 'failure'
        working-directory: ${{ matrix.package.dir }}
        run: npm test --if-present
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照（bamiyanapp/karuta#583）
      - name: Checkout dev-standards (for the local composite action)
        if: (matrix.package.coverage_threshold || inputs.coverage_threshold) > 0
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: v1.6.1
          path: .dev-standards-actions
      - name: Check coverage threshold
        if: (matrix.package.coverage_threshold || inputs.coverage_threshold) > 0
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ matrix.package.dir }}
          threshold: ${{ matrix.package.coverage_threshold || inputs.coverage_threshold }}
          label: ${{ matrix.package.dir }}
          metrics: ${{ matrix.package.coverage_metrics || inputs.coverage_metrics }}
          check-per-file: ${{ matrix.package.coverage_check_per_file || inputs.coverage_check_per_file }}
      - name: Build
        if: matrix.package.build == true
        working-directory: ${{ matrix.package.dir }}
        run: npm run build

  frontend-e2e-test:
    needs: commitlint
    if: |
      always() &&
      inputs.enable_e2e_test &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    # E2Eスクリーンショットの公開（issue #568）に、専用ブランチへのpush（contents）と
    # PRへのコメント投稿（pull-requests）が必要
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.frontend_dir }}
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: ${{ inputs.frontend_dir }}
        run: npx playwright install chromium --with-deps
      - name: Build
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run build
      - name: Run E2E tests
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run test:e2e
      # E2EテストのJSカバレッジ算出結果をログ・Job Summaryへ出力する（issue #541）。
      # frontend側のPlaywright設定（playwright.config.jsのmonocart-reporter）が
      # frontend-testジョブのユニットテストカバレッジと同じ形式・パス
      # （coverage/coverage-summary.json）で出力する構成になっているため、
      # frontend-test/backend-testで使っているのと同じ複合アクションをそのまま
      # 再利用する。閾値によるゲートは行わない（thresholdは常に0、ログ出力のみが
      # このissueのスコープ。ゲート運用の要否は別issueで検討する）。テストが失敗した
      # 場合でも、そこまでに収集できたカバレッジを確認できるようif: always()にする
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照（bamiyanapp/karuta#583）。
      # このステップは実際に他リポジトリ（karuta）から呼び出された際に初めて
      # 顕在化した不具合の発生源そのもの（if: always()で必ず実行されるため、
      # coverage_thresholdが0のfrontend-test/backend-testでは潜在化していた同じ
      # 不具合が最初に表面化した）
      - name: Checkout dev-standards (for the local composite action)
        if: always()
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: v1.6.1
          path: .dev-standards-actions
      - name: Show E2E coverage
        if: always()
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ inputs.frontend_dir }}
          threshold: 0
          label: frontend-e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: ${{ inputs.frontend_dir }}/playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-coverage-report
          path: ${{ inputs.frontend_dir }}/coverage/
          retention-days: 30
      # E2Eスクリーンショットの見やすい形での共有（issue #568）。
      # GitHub Actionsのアーティファクト（zip）はダウンロード・展開が必要で、
      # 特にスマホ版GitHubアプリからは実質閲覧不可能なため、代わりに
      # スクリーンショットPNGを専用ブランチ（e2e-screenshots）へ公開し、
      # raw.githubusercontent.comのURLとしてJob Summary・PRコメントへ画像を
      # 直接埋め込む（どちらもGitHubのモバイルアプリでネイティブに表示される）。
      # frontend/e2e/screenshot.jsのcaptureScreenshot()がこのディレクトリへ
      # PNGを書き出す（テストが1件もスクリーンショットを撮っていない場合は
      # ディレクトリ自体が存在しないため、以降のステップはスキップされる）
      - name: Check for E2E screenshots
        id: screenshots
        if: always()
        working-directory: ${{ inputs.frontend_dir }}
        run: |
          if [ -d e2e-screenshots ] && [ -n "$(ls -A e2e-screenshots/*.png 2>/dev/null)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      # 補助的な機能であり、このステップの失敗（ブランチ保護やトークン権限の問題等）が
      # 実際のE2Eテスト結果（成功/失敗）の判定を上書きしてはならないため
      # continue-on-error: trueにする
      - name: Publish E2E screenshots to a dedicated branch
        id: publish-screenshots
        if: always() && steps.screenshots.outputs.found == 'true'
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ${{ inputs.frontend_dir }}/e2e-screenshots
          publish_branch: e2e-screenshots
          destination_dir: runs/${{ github.run_id }}
          # 過去の実行分を上書き・削除せず蓄積する（他のPR・実行から参照されている
          # 可能性があるURLを壊さないため）。リポジトリ肥大化の対応（古い実行分の
          # 定期削除等）は必要になった時点で別途検討する
          keep_files: true
      # issue #628: スクリーンショット数が増えるほど、そのPRの変更と無関係な
      # 既存機能の回帰確認用スクリーンショットまで常に展開表示され見にくくなる。
      # そのPRで実際に変更されたファイル一覧を先に取得しておき、「Build E2E
      # screenshots summary」で各スペックの宣言（spec-source-map.json）と
      # 突き合わせて関連の有無を判定する。pull_request以外のイベントでは
      # 変更ファイル一覧を取得できないため、後段は常にフォールバック（全展開）
      # 動作になる
      - name: Determine PR changed files
        id: changed-files
        if: always() && steps.screenshots.outputs.found == 'true' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            fs.writeFileSync(
              path.join('${{ inputs.frontend_dir }}', 'changed-files.json'),
              JSON.stringify(files.map((f) => f.filename))
            );
      - name: Build E2E screenshots summary
        id: screenshots-summary
        if: always() && steps.publish-screenshots.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const frontendDir = '${{ inputs.frontend_dir }}';
            const screenshotDir = path.join(frontendDir, 'e2e-screenshots');
            const runId = '${{ github.run_id }}';
            const repo = '${{ github.repository }}';

            // 呼び出し側（karuta等）が任意で用意するファイル。無い場合は常に
            // 展開表示にフォールバックする（この機能は宣言ファイルを用意した
            // プロダクトだけがオプトインする形で、それ以外は従来どおりの挙動を保つ）
            const readJsonIfExists = (p) => {
              try {
                return JSON.parse(fs.readFileSync(p, 'utf-8'));
              } catch {
                return null;
              }
            };
            // 各スペックファイル（例: quiz-room.spec.js）が検証対象とする
            // ソースパスの宣言（issue #628、bamiyanapp/karuta#628「案A」）。
            // 値がテストケース名をキーとするオブジェクトの場合はテストケース単位の
            // 宣言（issue #651）、配列の場合は従来どおりファイル単位の宣言として扱う
            // （宣言ファイルをまだテストケース単位に移行していない呼び出し側との
            // 後方互換のため）
            const sourceMap = readJsonIfExists(path.join(frontendDir, 'e2e', 'spec-source-map.json')) || {};
            // このPRで実際に変更されたファイル一覧（前段のステップが取得。
            // pull_request以外のイベントや取得失敗時はnullのまま）
            const changedFiles = readJsonIfExists(path.join(frontendDir, 'changed-files.json'));
            const changedSet = changedFiles ? new Set(changedFiles) : null;

            const pngFiles = fs.readdirSync(screenshotDir).filter((f) => f.endsWith('.png')).sort();
            const groups = new Map();
            for (const png of pngFiles) {
              const name = png.slice(0, -'.png'.length);
              // 呼び出し側（frontend/e2e/screenshot.jsのcaptureScreenshot()）が
              // 同名の*.caption.txtを書き出していれば、それを見出しに使う（issue
              // bamiyanapp/karuta#601）。無ければ従来どおりファイル名をそのまま使う
              const captionPath = path.join(screenshotDir, `${name}.caption.txt`);
              const caption = fs.existsSync(captionPath) ? fs.readFileSync(captionPath, 'utf-8') : name;
              // 同名の*.spec.txtにどのスペックファイルが撮影したかが記録されている
              // （issue #628）。無い場合は関連判定できないグループとして扱う
              const specPath = path.join(screenshotDir, `${name}.spec.txt`);
              const spec = fs.existsSync(specPath) ? fs.readFileSync(specPath, 'utf-8').trim() : null;
              // 同名の*.title.txtにテストケース名（testInfo.title）が記録されて
              // いれば、スペックファイル単位ではなくテストケース単位でグループ化する
              // （issue #651: 同じファイル内の無関係なシナリオが一括りにされ、
              // 折りたたみの単位として粗い問題への対応）。無ければ従来どおり
              // スペックファイル単位までの粒度に留める
              const titlePath = path.join(screenshotDir, `${name}.title.txt`);
              const title = fs.existsSync(titlePath) ? fs.readFileSync(titlePath, 'utf-8').trim() : null;
              // 同名タイトルが別ファイルに存在する可能性を考慮し、グルーピングの
              // キー自体はspecとtitleの組で一意にする
              const key = spec && title ? `${spec}::${title}` : (spec || '(spec不明)');
              if (!groups.has(key)) {
                groups.set(key, { spec, title, items: [] });
              }
              groups.get(key).items.push({ name, caption });
            }

            const imageMarkdown = ({ name, caption }) =>
              `**${caption}**\n\n![${caption}](https://raw.githubusercontent.com/${repo}/e2e-screenshots/runs/${runId}/${name}.png)\n`;

            let body = '### E2Eスクリーンショット\n\n';
            for (const { spec, title, items } of groups.values()) {
              const specDeclaration = spec ? sourceMap[spec] : undefined;
              const declaredPaths = Array.isArray(specDeclaration)
                ? specDeclaration // 旧形式（ファイル単位の宣言）
                : (title ? specDeclaration?.[title] : undefined); // 新形式（テストケース単位の宣言）
              // 判定材料（宣言・変更ファイル一覧のいずれか）が欠けている場合は、
              // 誤って無関係と判定し見落とすことを避けるため常に展開表示にする
              const related = !changedSet || !declaredPaths || declaredPaths.some((p) => changedSet.has(p));
              const label = title || spec || '(spec不明)';
              if (related) {
                body += items.map(imageMarkdown).join('\n') + '\n';
              } else {
                body += `<details>\n<summary>${label}${title && spec ? ` (${spec})` : ''}（このPRの変更とは無関係の可能性があるため折りたたみ）</summary>\n\n`;
                body += items.map(imageMarkdown).join('\n');
                body += '\n</details>\n\n';
              }
            }

            fs.writeFileSync(path.join(frontendDir, 'screenshots-summary.md'), body, 'utf-8');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, body);
      - name: Comment E2E screenshots on the pull request
        if: always() && steps.screenshots-summary.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const body = fs.readFileSync(
              path.join('${{ inputs.frontend_dir }}', 'screenshots-summary.md'),
              'utf-8'
            );
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  standards-check:
    needs: commitlint
    if: |
      always() &&
      inputs.enable_standards_check &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Check dev-standards symlinks / .gitignore drift
        run: node dev-standards/scripts/bootstrap.js --check

  merge:
    needs: [commitlint, frontend-test, backend-test, package-test, frontend-e2e-test, standards-check]
    if: |
      always() &&
      inputs.enable_auto_merge &&
      github.event_name == 'pull_request' &&
      needs.commitlint.result == 'success' &&
      (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped') &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped') &&
      (needs.package-test.result == 'success' || needs.package-test.result == 'skipped') &&
      (needs.frontend-e2e-test.result == 'success' || needs.frontend-e2e-test.result == 'skipped') &&
      (needs.standards-check.result == 'success' || needs.standards-check.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # 複数PRのマージが競合しないよう、リポジトリ全体で1件ずつ直列に処理する。
    # cancel-in-progress: false でキャンセルではなく順番待ちにする。
    concurrency:
      group: merge-queue-${{ github.repository }}
      cancel-in-progress: false
    steps:
      # バージョン計算・タグ付け・GitHub Release作成はreusable-cd.ymlのreleaseジョブが
      # base_branchへのpush後に行う（詳細はreusable-cd.yml冒頭のコメントを参照）。
      # このジョブはPRのsquash mergeのみを担当する。
      - name: Merge pull request
        id: merge-pr
        uses: actions/github-script@v9
        with:
          # base_branchへのpushでCDワークフローがトリガーされる必要があるため、
          # ここはBOT_TOKEN（未設定時はGITHUB_TOKEN）を使う
          github-token: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const branchName = context.payload.pull_request.head.ref;
            console.log(`Attempting to merge PR #${prNumber}`);
            let mergeSha = "";
            // pushで作成したコミット直後はGitHub側のmergeable判定が
            // 追いついていないことがあるため、短い間隔でリトライする
            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const { data } = await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: "squash"
                });
                mergeSha = data.sha;
                core.setOutput("merge_sha", mergeSha);
                console.log(`Successfully merged PR #${prNumber} as ${mergeSha}`);
                break;
              } catch (error) {
                if (attempt === maxAttempts) {
                  console.error(`Failed to merge PR #${prNumber}:`, error.message);
                  throw error;
                }
                console.log(`Merge attempt ${attempt} failed (${error.message}), retrying...`);
                await new Promise((resolve) => setTimeout(resolve, attempt * 3000));
              }
            }

            try {
              console.log(`Attempting to delete branch: ${branchName}`);
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`
              });
              console.log(`Successfully deleted branch: ${branchName}`);
            } catch (error) {
              if (error.status === 422 || error.message.includes("Reference does not exist")) {
                console.log(`Branch ${branchName} already deleted or not found.`);
              } else {
                console.error(`Failed to delete branch ${branchName}:`, error.message);
              }
            }
