name: Reusable CI

on:
  workflow_call:
    inputs:
      frontend_dir:
        description: "frontendパッケージのディレクトリ名"
        type: string
        default: "frontend"
      backend_dir:
        description: "backendパッケージのディレクトリ名"
        type: string
        default: "backend"
      node_version:
        description: "frontend/backendのビルド・テストに使うNode.jsのバージョン"
        type: string
        default: "20"
      workspaces:
        description: "frontend/backendがnpm workspaces構成（ルート直下に単一のpackage-lock.jsonのみを持つ）かどうか。trueの場合、依存インストールをリポジトリルートで行う。"
        type: boolean
        default: false
      enable_e2e_test:
        description: "frontendのE2Eテスト（Playwright）ジョブを実行するかどうか。実行する場合、frontend_dir配下にtest:e2eスクリプトが必要。"
        type: boolean
        default: false
      enable_auto_merge:
        description: "CI（frontend-test/backend-test/frontend-e2e-test）成功後にmergeジョブでPRを自動マージするかどうか。falseの場合、CIチェックのみ行い、マージは人手で行う。"
        type: boolean
        default: true
      # 以下のrelease関連inputは後方互換のために残しているが、このワークフロー内では
      # 使用しない（semantic-releaseの実行はreusable-cd.ymlのreleaseジョブへ移動した。
      # 理由: pull_requestイベントのGITHUB_REF/GITHUB_REF_NAMEはrefs/pull/<PR番号>/mergeに
      # 固定されGitHub Actions上で上書きできないため、PRブランチ上でsemantic-releaseの
      # ブランチ判定を偽装する方式は機能しない。同じ入力名をreusable-cd.yml側で受け取る）。
      enable_release:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。reusable-cd.ymlの同名inputを指定すること。"
        type: boolean
        default: true
      semantic_release_node_version:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "22"
      base_branch:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "main"
      enable_changelog_json:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: boolean
        default: false
      changelog_source_path:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "CHANGELOG.md"
      changelog_json_output_path:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: string
        default: "frontend/src/changelog.json"
      enable_standards_check:
        description: "dev-standards submoduleのsync-manifest.jsonに基づき、symlink欠落・リンク切れ・.gitignoreの内容乖離を`scripts/bootstrap.js --check`で検知するジョブを実行するかどうか。"
        type: boolean
        default: false
      enable_shared_release_config:
        description: "[非推奨・reusable-cd.ymlへ移動] このワークフロー内では使用しない。"
        type: boolean
        default: false
      packages:
        description: >-
          frontend_dir/backend_dirによる固定2パッケージ構成の代わりに、matrix構成でlint/test/buildする
          パッケージ一覧をJSON配列で指定する（例: '[{"dir":"frontend","build":true},{"dir":"backend"}]'）。
          各要素は{dir, build, node_version, coverage_threshold}を持つオブジェクトで、dir以外は省略可能
          （buildは省略時false、node_versionは省略時inputs.node_version、coverage_thresholdは省略時
          inputs.coverage_threshold）。
          lint（`npm run lint --if-present`）・test（`npm test --if-present`）は対応するnpm scriptsが
          package.jsonに存在しない場合は自動的にスキップする（テストランナー非依存。vitest直接呼び出しは行わない）。
          空文字列（既定）の場合は既存通りfrontend_dir/backend_dirの固定ジョブを使う（後方互換のためデフォルトは空）。
        type: string
        default: ""
      coverage_threshold:
        description: >-
          カバレッジ閾値（%、0以下でゲート無効）。frontend-test/backend-testでは`npx vitest run --coverage`に
          `--coverage.reporter=json-summary`を追加して集計を出力し、閾値未満ならジョブを失敗させる。
          いずれの場合もcoverage/coverage-summary.jsonが存在すればJob Summaryにカバレッジ表を出力する
          （閾値を設定していない場合も表示のみは行われる）。packagesのmatrix構成では各要素の
          coverage_thresholdで上書きできる（テストコマンド自体がjson-summaryを出力する設定になっている必要がある）。
        type: number
        default: 0
    secrets:
      BOT_TOKEN:
        required: false

jobs:
  # commitlintジョブは実際のコミットメッセージ検証の前に、Node.jsセットアップ・
  # 依存関係インストールという「インフラ起因で失敗しうる」工程を挟む。これらが
  # GitHub側の一時的な障害（setup-nodeのバージョンマニフェスト取得失敗等）で
  # 失敗した場合と、コミットメッセージ自体が実際に規約違反だった場合を区別できるよう、
  # 各工程をcontinue-on-error付きで実行し、最後の「Determine result」ステップで
  # 出力（infra_failure）へ反映する。後続の各テストジョブは、commitlintジョブが
  # 失敗していてもinfra_failure=trueであれば実行される（インフラ起因の失敗で
  # テスト結果自体が見えなくなることを防ぐ）。ただし`merge`ジョブは、コミット
  # メッセージを実際に検証できていない以上、いずれの失敗理由でも従来通りブロックされる
  # （needs.commitlint.result == 'success'を要求したまま変更しない）。
  commitlint:
    runs-on: ubuntu-latest
    outputs:
      infra_failure: ${{ steps.result.outputs.infra_failure }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true
      # setup-nodeはNode.jsバージョンマニフェストの取得をGitHub側から行うため、
      # 一時的な障害（HTMLのエラーページが返りJSONパースに失敗する等）で失敗することがある。
      # 特に"lts/*"のようなエイリアスはこの障害の影響を受けやすい専用の解決経路
      # （"Attempt to resolve LTS alias from manifest..."）を通るため、具体的な
      # メジャーバージョン番号（"22"）へ固定してこの経路自体を回避する。それでも
      # 発生しうる一時的な失敗に備え、同一の呼び出しを1回だけ自動リトライする
      # （新しいアクション参照を追加すると、このリポジトリ自身が未タグ付けの状態で
      # それを参照することになり解決できないため、複合アクション化はせずジョブ内に
      # インラインで実装する）
      - name: Setup Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Setup Node.js (attempt 2/2, retry after a transient failure)
        id: setup-node-2
        if: steps.setup-node-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        id: install
        if: steps.setup-node-1.outcome == 'success' || steps.setup-node-2.outcome == 'success'
        continue-on-error: true
        run: npm ci
      - name: Validate current commit (last commit)
        id: lint-push
        if: steps.install.outcome == 'success' && github.event_name == 'push'
        continue-on-error: true
        run: npx commitlint --from HEAD~1 --to HEAD --verbose
      - name: Validate PR commits
        id: lint-pr
        if: steps.install.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --git-log-args="--no-merges" \
            --verbose
      - name: Determine result
        id: result
        shell: bash
        run: |
          if [ "${{ steps.install.outcome }}" != "success" ]; then
            echo "infra_failure=true" >> "$GITHUB_OUTPUT"
            echo "::warning::commitlintジョブの環境構築（Node.jsセットアップ/npm ci）に失敗したため、コミットメッセージの検証自体を実行できませんでした。GitHub側の一時的な問題（setup-nodeのバージョンマニフェスト取得失敗等）の場合もあれば、ルート直下のpackage.json/package-lock.jsonの不整合等、実際に対応が必要な問題の場合もあります。いずれにせよコミットメッセージ自体の内容とは無関係なため、後続のテストジョブはこの失敗を理由にブロックしませんが、mergeジョブはコミットメッセージを実際に検証できていないため引き続きブロックされます。"
            exit 1
          fi
          echo "infra_failure=false" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.lint-push.outcome }}" = "failure" ] || [ "${{ steps.lint-pr.outcome }}" = "failure" ]; then
            exit 1
          fi
          exit 0

  frontend-test:
    needs: commitlint
    if: |
      always() &&
      inputs.packages == '' &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.frontend_dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run lint
      - name: Test
        working-directory: ${{ inputs.frontend_dir }}
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary
      # ステップの`uses: ./path`は常に呼び出し元リポジトリ（このジョブでCheckoutした
      # 対象、frontend_dir/backend_dirを持つ側）のチェックアウト内容に対して解決される
      # （reusable-ci.yml自身のrefには解決されない。ジョブレベルの`uses:`でreusable
      # workflow自体を参照する場合と異なる点に注意）。また、`uses:`フィールド自体は
      # steps contextを参照できず、ジョブ計画時に静的に解決可能な値でなければならない
      # （`steps.<id>.outputs`のような実行時の値を`uses:`に直接渡すと、そのジョブが
      # 1つも作成されないまま即座に失敗する＝startup failureになる。過去の修正で
      # 一度この誤った実装をリリースしてしまい、他リポジトリ（karuta）のCIを完全に
      # 止めた実例がある。bamiyanapp/karuta#583参照）。そのため、`with:`（`actions/checkout`
      # の`ref:`。こちらはsteps contextを問題なく参照できる）でこのワークフロー自身と
      # 同じrefをdev-standardsの別ディレクトリへ明示的にcheckoutし、`uses:`には固定の
      # 相対パス文字列のみを渡す
      - name: Resolve this workflow's own ref
        id: dev-standards-ref
        if: inputs.coverage_threshold > 0
        shell: bash
        run: |
          ref="${GITHUB_WORKFLOW_REF#*@}"
          ref="${ref#refs/tags/}"
          ref="${ref#refs/heads/}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Checkout dev-standards (for the local composite action)
        if: inputs.coverage_threshold > 0
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: ${{ steps.dev-standards-ref.outputs.ref }}
          path: .dev-standards-actions
      - name: Check coverage threshold
        if: inputs.coverage_threshold > 0
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ inputs.frontend_dir }}
          threshold: ${{ inputs.coverage_threshold }}
          label: frontend
      - name: Build
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run build

  backend-test:
    needs: commitlint
    if: |
      always() &&
      inputs.packages == '' &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.backend_dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.backend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.backend_dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ inputs.backend_dir }}
        run: npm run lint
      - name: Test
        working-directory: ${{ inputs.backend_dir }}
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照（bamiyanapp/karuta#583）
      - name: Resolve this workflow's own ref
        id: dev-standards-ref
        if: inputs.coverage_threshold > 0
        shell: bash
        run: |
          ref="${GITHUB_WORKFLOW_REF#*@}"
          ref="${ref#refs/tags/}"
          ref="${ref#refs/heads/}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Checkout dev-standards (for the local composite action)
        if: inputs.coverage_threshold > 0
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: ${{ steps.dev-standards-ref.outputs.ref }}
          path: .dev-standards-actions
      - name: Check coverage threshold
        if: inputs.coverage_threshold > 0
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ inputs.backend_dir }}
          threshold: ${{ inputs.coverage_threshold }}
          label: backend

  package-test:
    needs: commitlint
    if: |
      always() &&
      inputs.packages != '' &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(inputs.packages) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.package.node_version || inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', matrix.package.dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.package.node_version || inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', matrix.package.dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || matrix.package.dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ matrix.package.dir }}
        run: npm run lint --if-present
      - name: Test
        working-directory: ${{ matrix.package.dir }}
        run: npm test --if-present
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照（bamiyanapp/karuta#583）
      - name: Resolve this workflow's own ref
        id: dev-standards-ref
        if: (matrix.package.coverage_threshold || inputs.coverage_threshold) > 0
        shell: bash
        run: |
          ref="${GITHUB_WORKFLOW_REF#*@}"
          ref="${ref#refs/tags/}"
          ref="${ref#refs/heads/}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Checkout dev-standards (for the local composite action)
        if: (matrix.package.coverage_threshold || inputs.coverage_threshold) > 0
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: ${{ steps.dev-standards-ref.outputs.ref }}
          path: .dev-standards-actions
      - name: Check coverage threshold
        if: (matrix.package.coverage_threshold || inputs.coverage_threshold) > 0
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ matrix.package.dir }}
          threshold: ${{ matrix.package.coverage_threshold || inputs.coverage_threshold }}
          label: ${{ matrix.package.dir }}
      - name: Build
        if: matrix.package.build == true
        working-directory: ${{ matrix.package.dir }}
        run: npm run build

  frontend-e2e-test:
    needs: commitlint
    if: |
      always() &&
      inputs.enable_e2e_test &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    # E2Eスクリーンショットの公開（issue #568）に、専用ブランチへのpush（contents）と
    # PRへのコメント投稿（pull-requests）が必要
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.frontend_dir }}
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: ${{ inputs.frontend_dir }}
        run: npx playwright install chromium --with-deps
      - name: Build
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run build
      - name: Run E2E tests
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run test:e2e
      # E2EテストのJSカバレッジ算出結果をログ・Job Summaryへ出力する（issue #541）。
      # frontend側のPlaywright設定（playwright.config.jsのmonocart-reporter）が
      # frontend-testジョブのユニットテストカバレッジと同じ形式・パス
      # （coverage/coverage-summary.json）で出力する構成になっているため、
      # frontend-test/backend-testで使っているのと同じ複合アクションをそのまま
      # 再利用する。閾値によるゲートは行わない（thresholdは常に0、ログ出力のみが
      # このissueのスコープ。ゲート運用の要否は別issueで検討する）。テストが失敗した
      # 場合でも、そこまでに収集できたカバレッジを確認できるようif: always()にする
      # 詳細はfrontend-testジョブの同名ステップのコメントを参照（bamiyanapp/karuta#583）。
      # このステップは実際に他リポジトリ（karuta）から呼び出された際に初めて
      # 顕在化した不具合の発生源そのもの（if: always()で必ず実行されるため、
      # coverage_thresholdが0のfrontend-test/backend-testでは潜在化していた同じ
      # 不具合が最初に表面化した）
      - name: Resolve this workflow's own ref
        id: dev-standards-ref
        if: always()
        shell: bash
        run: |
          ref="${GITHUB_WORKFLOW_REF#*@}"
          ref="${ref#refs/tags/}"
          ref="${ref#refs/heads/}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Checkout dev-standards (for the local composite action)
        if: always()
        uses: actions/checkout@v7
        with:
          repository: bamiyanapp/dev-standards
          ref: ${{ steps.dev-standards-ref.outputs.ref }}
          path: .dev-standards-actions
      - name: Show E2E coverage
        if: always()
        uses: ./.dev-standards-actions/.github/actions/check-coverage-threshold
        with:
          working-directory: ${{ inputs.frontend_dir }}
          threshold: 0
          label: frontend-e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: ${{ inputs.frontend_dir }}/playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-coverage-report
          path: ${{ inputs.frontend_dir }}/coverage/
          retention-days: 30
      # E2Eスクリーンショットの見やすい形での共有（issue #568）。
      # GitHub Actionsのアーティファクト（zip）はダウンロード・展開が必要で、
      # 特にスマホ版GitHubアプリからは実質閲覧不可能なため、代わりに
      # スクリーンショットPNGを専用ブランチ（e2e-screenshots）へ公開し、
      # raw.githubusercontent.comのURLとしてJob Summary・PRコメントへ画像を
      # 直接埋め込む（どちらもGitHubのモバイルアプリでネイティブに表示される）。
      # frontend/e2e/screenshot.jsのcaptureScreenshot()がこのディレクトリへ
      # PNGを書き出す（テストが1件もスクリーンショットを撮っていない場合は
      # ディレクトリ自体が存在しないため、以降のステップはスキップされる）
      - name: Check for E2E screenshots
        id: screenshots
        if: always()
        working-directory: ${{ inputs.frontend_dir }}
        run: |
          if [ -d e2e-screenshots ] && [ -n "$(ls -A e2e-screenshots/*.png 2>/dev/null)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      # 補助的な機能であり、このステップの失敗（ブランチ保護やトークン権限の問題等）が
      # 実際のE2Eテスト結果（成功/失敗）の判定を上書きしてはならないため
      # continue-on-error: trueにする
      - name: Publish E2E screenshots to a dedicated branch
        id: publish-screenshots
        if: always() && steps.screenshots.outputs.found == 'true'
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ${{ inputs.frontend_dir }}/e2e-screenshots
          publish_branch: e2e-screenshots
          destination_dir: runs/${{ github.run_id }}
          # 過去の実行分を上書き・削除せず蓄積する（他のPR・実行から参照されている
          # 可能性があるURLを壊さないため）。リポジトリ肥大化の対応（古い実行分の
          # 定期削除等）は必要になった時点で別途検討する
          keep_files: true
      - name: Build E2E screenshots summary
        id: screenshots-summary
        if: always() && steps.publish-screenshots.outcome == 'success'
        continue-on-error: true
        working-directory: ${{ inputs.frontend_dir }}
        run: |
          {
            echo "### E2Eスクリーンショット"
            echo ""
            for f in e2e-screenshots/*.png; do
              name="$(basename "$f" .png)"
              echo "**${name}**"
              echo ""
              echo "![${name}](https://raw.githubusercontent.com/${{ github.repository }}/e2e-screenshots/runs/${{ github.run_id }}/$(basename "$f"))"
              echo ""
            done
          } | tee screenshots-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment E2E screenshots on the pull request
        if: always() && steps.screenshots-summary.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const body = fs.readFileSync(
              path.join('${{ inputs.frontend_dir }}', 'screenshots-summary.md'),
              'utf-8'
            );
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  standards-check:
    needs: commitlint
    if: |
      always() &&
      inputs.enable_standards_check &&
      (needs.commitlint.result == 'success' || needs.commitlint.outputs.infra_failure == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true
      # setup-nodeのバージョンマニフェスト取得がGitHub側の一時的な障害で失敗することが
      # あるため、1回だけ自動リトライする
      - name: Use Node.js (attempt 1/2)
        id: setup-node-1
        continue-on-error: true
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Wait before retrying Node.js setup
        if: steps.setup-node-1.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: Use Node.js (attempt 2/2, retry after a transient failure)
        if: steps.setup-node-1.outcome == 'failure'
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Check dev-standards symlinks / .gitignore drift
        run: node dev-standards/scripts/bootstrap.js --check

  merge:
    needs: [commitlint, frontend-test, backend-test, package-test, frontend-e2e-test, standards-check]
    if: |
      always() &&
      inputs.enable_auto_merge &&
      github.event_name == 'pull_request' &&
      needs.commitlint.result == 'success' &&
      (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped') &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped') &&
      (needs.package-test.result == 'success' || needs.package-test.result == 'skipped') &&
      (needs.frontend-e2e-test.result == 'success' || needs.frontend-e2e-test.result == 'skipped') &&
      (needs.standards-check.result == 'success' || needs.standards-check.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # 複数PRのマージが競合しないよう、リポジトリ全体で1件ずつ直列に処理する。
    # cancel-in-progress: false でキャンセルではなく順番待ちにする。
    concurrency:
      group: merge-queue-${{ github.repository }}
      cancel-in-progress: false
    steps:
      # バージョン計算・タグ付け・GitHub Release作成はreusable-cd.ymlのreleaseジョブが
      # base_branchへのpush後に行う（詳細はreusable-cd.yml冒頭のコメントを参照）。
      # このジョブはPRのsquash mergeのみを担当する。
      - name: Merge pull request
        id: merge-pr
        uses: actions/github-script@v9
        with:
          # base_branchへのpushでCDワークフローがトリガーされる必要があるため、
          # ここはBOT_TOKEN（未設定時はGITHUB_TOKEN）を使う
          github-token: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const branchName = context.payload.pull_request.head.ref;
            console.log(`Attempting to merge PR #${prNumber}`);
            let mergeSha = "";
            // pushで作成したコミット直後はGitHub側のmergeable判定が
            // 追いついていないことがあるため、短い間隔でリトライする
            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const { data } = await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: "squash"
                });
                mergeSha = data.sha;
                core.setOutput("merge_sha", mergeSha);
                console.log(`Successfully merged PR #${prNumber} as ${mergeSha}`);
                break;
              } catch (error) {
                if (attempt === maxAttempts) {
                  console.error(`Failed to merge PR #${prNumber}:`, error.message);
                  throw error;
                }
                console.log(`Merge attempt ${attempt} failed (${error.message}), retrying...`);
                await new Promise((resolve) => setTimeout(resolve, attempt * 3000));
              }
            }

            try {
              console.log(`Attempting to delete branch: ${branchName}`);
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`
              });
              console.log(`Successfully deleted branch: ${branchName}`);
            } catch (error) {
              if (error.status === 422 || error.message.includes("Reference does not exist")) {
                console.log(`Branch ${branchName} already deleted or not found.`);
              } else {
                console.error(`Failed to delete branch ${branchName}:`, error.message);
              }
            }
