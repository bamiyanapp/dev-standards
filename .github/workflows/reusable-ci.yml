name: Reusable CI

on:
  workflow_call:
    inputs:
      frontend_dir:
        description: "frontendパッケージのディレクトリ名"
        type: string
        default: "frontend"
      backend_dir:
        description: "backendパッケージのディレクトリ名"
        type: string
        default: "backend"
      node_version:
        description: "frontend/backend/semantic-releaseの実行に使うNode.jsのバージョン"
        type: string
        default: "20"
      workspaces:
        description: "frontend/backendがnpm workspaces構成（ルート直下に単一のpackage-lock.jsonのみを持つ）かどうか。trueの場合、依存インストールをリポジトリルートで行う。"
        type: boolean
        default: false
      enable_e2e_test:
        description: "frontendのE2Eテスト（Playwright）ジョブを実行するかどうか。実行する場合、frontend_dir配下にtest:e2eスクリプトが必要。"
        type: boolean
        default: false
      enable_release:
        description: "マージ前にsemantic-releaseでバージョン更新を行うかどうか。release運用をしないリポジトリはfalseを指定する。"
        type: boolean
        default: true
      base_branch:
        description: "マージ先となるベースブランチ名"
        type: string
        default: "main"
      enable_changelog_json:
        description: "CHANGELOG.mdをJSON化するスクリプトを実行前に生成し、semantic-releaseのprepareCmd（scripts/convert-changelog-to-json.js）から利用可能にするかどうか。参照側リポジトリでこのファイルをsubmodule経由のシンボリックリンクとして持つ必要がなくなる。"
        type: boolean
        default: false
      changelog_source_path:
        description: "変換元のCHANGELOG.mdパス（リポジトリルート基準）。enable_changelog_json=trueの場合のみ使用。"
        type: string
        default: "CHANGELOG.md"
      changelog_json_output_path:
        description: "変換後のJSON出力先パス（リポジトリルート基準）。enable_changelog_json=trueの場合のみ使用。"
        type: string
        default: "frontend/src/changelog.json"
    secrets:
      BOT_TOKEN:
        required: false

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Validate current commit (last commit)
        if: github.event_name == 'push'
        run: npx commitlint --from HEAD~1 --to HEAD --verbose
      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --git-log-args="--no-merges" \
            --verbose

  frontend-test:
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.frontend_dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run lint
      - name: Test
        working-directory: ${{ inputs.frontend_dir }}
        run: npx vitest run --coverage
      - name: Build
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run build

  backend-test:
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.backend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.backend_dir }}
        run: npm ci
      - name: Lint
        working-directory: ${{ inputs.backend_dir }}
        run: npm run lint
      - name: Test
        working-directory: ${{ inputs.backend_dir }}
        run: npx vitest run --coverage

  frontend-e2e-test:
    needs: commitlint
    if: inputs.enable_e2e_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workspaces && 'package-lock.json' || format('{0}/package-lock.json', inputs.frontend_dir) }}
      - name: Install dependencies
        working-directory: ${{ inputs.workspaces && '.' || inputs.frontend_dir }}
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: ${{ inputs.frontend_dir }}
        run: npx playwright install chromium --with-deps
      - name: Build
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run build
      - name: Run E2E tests
        working-directory: ${{ inputs.frontend_dir }}
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ${{ inputs.frontend_dir }}/playwright-report/
          retention-days: 30

  merge:
    needs: [frontend-test, backend-test, frontend-e2e-test]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.frontend-test.result == 'success' &&
      needs.backend-test.result == 'success' &&
      (needs.frontend-e2e-test.result == 'success' || needs.frontend-e2e-test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # 複数PRの版番号計算・マージが競合しないよう、リポジトリ全体で1件ずつ直列に処理する。
    # cancel-in-progress: false でキャンセルではなく順番待ちにする。
    concurrency:
      group: merge-queue-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout PR branch
        if: inputs.enable_release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # GITHUB_TOKEN でのpushは他のworkflowをトリガーしないため、
          # ここでのバージョン更新コミットのpushでPRのCIが再実行されるのを防ぐ
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update working branch with latest ${{ inputs.base_branch }}
        if: inputs.enable_release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ inputs.base_branch }} --tags
          git merge origin/${{ inputs.base_branch }} --no-edit

      - name: Setup Node.js
        if: inputs.enable_release
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        if: inputs.enable_release
        run: npm ci

      # 参照側リポジトリがsubmodule経由のシンボリックリンクとしてこのスクリプトを
      # 持つ場合でも、このジョブのcheckoutはsubmoduleを取得しないためリンク先が
      # 存在せずsemantic-releaseのprepareCmdが失敗する。そのためこのジョブ内で
      # 直接生成し、参照側にファイルの実体を持たせない。
      - name: Generate changelog-to-JSON conversion script
        if: inputs.enable_release && inputs.enable_changelog_json
        run: |
          mkdir -p scripts "$(dirname '${{ inputs.changelog_json_output_path }}')"
          cat > scripts/convert-changelog-to-json.js <<'SCRIPT_EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const changelogPath = path.resolve(process.cwd(), '${{ inputs.changelog_source_path }}');
          const outputPath = path.resolve(process.cwd(), '${{ inputs.changelog_json_output_path }}');

          try {
            if (!fs.existsSync(changelogPath)) {
              console.log('CHANGELOG.md not found, skipping JSON generation.');
              fs.writeFileSync(outputPath, '[]');
              process.exit(0);
            }

            const content = fs.readFileSync(changelogPath, 'utf8');

            // バージョンヘッダーのマッチング (例: ## [1.1.0](...) (2025-01-04) または # 1.1.0 (2025-01-04))
            const versionRegex = /^#+ \[?([0-9.]+)\]?(?:\(.*\))? \(([0-9-]+)\)/gm;

            const entries = [];
            let match;

            const matches = [];
            while ((match = versionRegex.exec(content)) !== null) {
              matches.push({
                version: match[1],
                date: match[2],
                index: match.index,
                endIndex: match.index + match[0].length
              });
            }

            // タグのコミット日時（実際のリリース時刻）を取得する。タグがまだ
            // 存在しない/取得できない場合（リリース対象バージョン自身の実行時等）はnullを返す。
            // 呼び出し側でCHANGELOG.mdの日付（日付のみ、時刻情報を持たない）にフォールバックする。
            function getReleaseDate(version) {
              let dateStr;
              try {
                dateStr = execSync(`git log -1 --format=%ai v${version}`, { stdio: 'pipe' }).toString().trim();
              } catch (e) {
                // ignore
              }

              if (!dateStr) {
                try {
                  dateStr = execSync(`git log -1 --format=%ai ${version}`, { stdio: 'pipe' }).toString().trim();
                } catch (e) {
                  // ignore
                }
              }

              if (!dateStr) return null;

              const date = new Date(dateStr);
              if (isNaN(date.getTime())) return null;

              const y = date.getFullYear();
              const m = String(date.getMonth() + 1).padStart(2, '0');
              const d = String(date.getDate()).padStart(2, '0');
              const H = String(date.getHours()).padStart(2, '0');
              const M = String(date.getMinutes()).padStart(2, '0');
              return `${y}/${m}/${d} ${H}:${M}`;
            }

            for (let i = 0; i < matches.length; i++) {
              const current = matches[i];
              const next = matches[i + 1];

              const start = current.endIndex;
              const end = next ? next.index : content.length;

              let body = content.substring(start, end).trim();

              const gitDate = getReleaseDate(current.version);

              // タグのコミット時刻が取得できない場合、実際には無い時刻情報を「00:00」として
              // 補ってしまうと実時刻と見分けがつかなくなるため、日付のみを表示する
              entries.push({
                version: current.version,
                date: gitDate || current.date.replace(/-/g, '/'),
                body: body
              });
            }

            fs.writeFileSync(outputPath, JSON.stringify(entries, null, 2));
            console.log(`Changelog converted to JSON: ${entries.length} entries`);

          } catch (error) {
            console.error('Error converting changelog:', error);
            process.exit(1);
          }
          SCRIPT_EOF

      - name: Record pre-release commit
        if: inputs.enable_release
        id: pre-release
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # PRブランチ上で直接semantic-releaseを実行する。isPrガードとCI検知系の
      # チェックを無効化するため --no-ci を付与し、対象ブランチをこのPRの
      # 作業ブランチに一時的に上書きする（.releaserc.cjsのbranches設定は
      # 通常運用時のCLI直接実行等を想定してそのまま残す）。
      # ブランチ名はPR作成者が自由に決められる値のため、run:のシェルスクリプトへ
      # 式展開で直接埋め込まずenv経由で渡す（シェルインジェクション対策）。
      - name: Semantic Release (on working branch)
        if: inputs.enable_release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: npx semantic-release --no-ci --branches "$HEAD_REF"

      # semantic-releaseは新バージョンを発行した場合のみコミット・タグ push を
      # 行うため、実行前後のコミットを比較して新リリースの有無を判定する
      - name: Check if a new release was published
        if: inputs.enable_release
        id: check-release
        run: |
          AFTER_SHA=$(git rev-parse HEAD)
          if [ "${{ steps.pre-release.outputs.sha }}" != "$AFTER_SHA" ]; then
            NEW_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge pull request
        id: merge-pr
        uses: actions/github-script@v7
        with:
          # base_branchへのpushでCDワークフローがトリガーされる必要があるため、
          # ここはBOT_TOKEN（未設定時はGITHUB_TOKEN）を使う
          github-token: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const branchName = context.payload.pull_request.head.ref;
            console.log(`Attempting to merge PR #${prNumber}`);
            let mergeSha = "";
            // pushで作成したコミット直後はGitHub側のmergeable判定が
            // 追いついていないことがあるため、短い間隔でリトライする
            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const { data } = await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: "squash"
                });
                mergeSha = data.sha;
                core.setOutput("merge_sha", mergeSha);
                console.log(`Successfully merged PR #${prNumber} as ${mergeSha}`);
                break;
              } catch (error) {
                if (attempt === maxAttempts) {
                  console.error(`Failed to merge PR #${prNumber}:`, error.message);
                  throw error;
                }
                console.log(`Merge attempt ${attempt} failed (${error.message}), retrying...`);
                await new Promise((resolve) => setTimeout(resolve, attempt * 3000));
              }
            }

            try {
              console.log(`Attempting to delete branch: ${branchName}`);
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`
              });
              console.log(`Successfully deleted branch: ${branchName}`);
            } catch (error) {
              if (error.status === 422 || error.message.includes("Reference does not exist")) {
                console.log(`Branch ${branchName} already deleted or not found.`);
              } else {
                console.error(`Failed to delete branch ${branchName}:`, error.message);
              }
            }

      # squash mergeによりPRブランチの版更新コミットはbase_branch上で新しい
      # コミットに置き換わる（tagが指すコミットはbase_branchの祖先ではなくなる）
      # ため、tagとGitHub Releaseのtarget_commitishをsquash後のコミットに
      # 付け替える
      - name: Retarget release tag to squashed commit
        if: inputs.enable_release && steps.check-release.outputs.new_release_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check-release.outputs.tag }}
          MERGE_SHA: ${{ steps.merge-pr.outputs.merge_sha }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          if [ -z "$TAG" ] || [ -z "$MERGE_SHA" ]; then
            echo "::warning::tag or merge_sha is empty, skipping retarget"
            exit 0
          fi
          # squash mergeで作られたコミットはこの時点でローカルに存在しないため、
          # base_branchを取得してオブジェクトを取り込んでからタグを打ち直す
          git fetch origin "$BASE_BRANCH"
          git tag -f "$TAG" "$MERGE_SHA"
          git push origin "refs/tags/$TAG" --force
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq .id || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/releases/$RELEASE_ID" -f target_commitish="$MERGE_SHA" || true
          fi
