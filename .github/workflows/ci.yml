name: CI
run-name: CI ${{ github.event.head_commit.message || github.event.pull_request.title }}

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ci:
    # 自リポジトリのreusable-ci.ymlをdogfoodingする。相対パス参照のため、このPRで
    # 変更中のreusable-ci.yml自体の内容がそのまま使われる（@main参照ではない）。
    uses: ./.github/workflows/reusable-ci.yml
    with:
      # semantic-release本体・一部プラグインがNode 22以上を要求するため、
      # reusable-ci.ymlのnode_version既定値（20）ではpackage-lock.jsonの
      # 整合性検証（npm ci）でnpmのバージョン差異により失敗する。
      packages: '[{"dir":".","node_version":"22"}]'
      enable_release: false
    secrets:
      # mergeジョブのスカッシュマージをBOT_TOKENで行わないと、GITHUB_TOKENによる
      # pushはGitHub Actions上で新たなワークフロー実行のトリガーにならず、
      # mainへのpushイベントが発生せずcd.ymlが起動しない（未設定時はGITHUB_TOKENに
      # フォールバックする）。
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
