name: "Copy changelog-to-JSON conversion script"
description: >-
  dev-standards本体が持つ scripts/convert-changelog-to-json.js を、
  呼び出し元リポジトリの scripts/convert-changelog-to-json.js へコピーする。
  semantic-releaseのprepareCmd（`node scripts/convert-changelog-to-json.js`）から
  実行される想定で、CHANGELOG_SOURCE_PATH / CHANGELOG_JSON_OUTPUT_PATH の
  各環境変数でパスを指定する（デフォルトはそれぞれ CHANGELOG.md /
  frontend/src/changelog.json）。

runs:
  using: "composite"
  steps:
    - name: Copy script into caller repository
      shell: bash
      run: |
        mkdir -p scripts
        cp "${{ github.action_path }}/../../../scripts/convert-changelog-to-json.js" scripts/convert-changelog-to-json.js
